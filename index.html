<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Xen</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;overflow:hidden}
#pin-gate{position:fixed;inset:0;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
#pin-gate h1{font-size:1.4rem;letter-spacing:.25em;margin-bottom:2rem;opacity:.6}
#pin-gate input{background:#1a1a2e;border:1px solid #333;border-radius:12px;color:#e8e8f0;font-size:1.8rem;letter-spacing:.4em;padding:.8rem 1.2rem;text-align:center;width:200px;-webkit-text-security:disc}
#pin-gate .err{color:#ff4466;font-size:.85rem;margin-top:.8rem;min-height:1.2em}
#shell{display:none;flex-direction:column;height:100%}
#tabs-bar{display:flex;align-items:center;background:#111118;border-bottom:1px solid #1e1e30;overflow-x:auto;padding:4px 4px 0;gap:2px;scrollbar-width:none;min-height:42px}
#tabs-bar::-webkit-scrollbar{display:none}
.tab{background:#1a1a28;border-radius:8px 8px 0 0;color:#888;cursor:pointer;font-size:.75rem;max-width:150px;min-width:70px;overflow:hidden;padding:7px 10px;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;transition:background .15s}
.tab.active{background:#222238;color:#e8e8f0}
#new-tab-btn{background:none;border:none;color:#555;cursor:pointer;font-size:1.3rem;flex-shrink:0;padding:2px 10px;line-height:1}
#url-bar{display:flex;align-items:center;background:#111118;border-bottom:1px solid #1e1e30;gap:6px;padding:6px 8px}
#url-input{background:#1a1a28;border:1px solid #2a2a40;border-radius:20px;color:#e8e8f0;flex:1;font-size:.9rem;outline:none;padding:7px 14px}
#url-input:focus{border-color:#4444cc}
#go-btn{background:#3333cc;border:none;border-radius:16px;color:#fff;cursor:pointer;font-size:.8rem;padding:7px 14px;flex-shrink:0}
#mic-btn{background:#1a1a28;border:1px solid #2a2a40;border-radius:50%;color:#888;cursor:pointer;font-size:1.1rem;flex-shrink:0;height:36px;width:36px;display:flex;align-items:center;justify-content:center}
#mic-btn.listening{border-color:#ff2244;background:#3a0a14;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
#content{flex:1;position:relative;overflow:hidden;background:#0d0d18}
#content-frame{position:absolute;inset:0;border:none;width:100%;height:100%;display:none}
#content-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;opacity:.4}
#content-placeholder .logo{font-size:3rem;letter-spacing:.2em}
#content-placeholder .hint{font-size:.8rem}
#status-bar{background:#0a0a12;border-top:1px solid #1a1a2a;color:#444;font-size:.68rem;padding:3px 12px;display:flex;justify-content:space-between}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.dot.green{background:#22cc66}.dot.red{background:#cc2244}.dot.grey{background:#444}
.navbtn{background:#1a1a28;border:1px solid #2a2a40;border-radius:50%;color:#888;cursor:pointer;font-size:.95rem;flex-shrink:0;height:32px;width:32px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.navbtn:active{background:#222238;color:#e8e8f0}
.navbtn:disabled{opacity:.35}
#swipe-zone{height:22px;background:linear-gradient(180deg,rgba(255,255,255,.03),transparent);border-bottom:1px solid #1e1e30;touch-action:pan-x;user-select:none;-webkit-user-select:none;position:relative}
#swipe-zone::before{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:24px;height:3px;border-radius:2px;background:rgba(255,255,255,.18)}
</style>
</head>
<body>

<div id="pin-gate">
  <h1>XEN</h1>
  <input id="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="····" autofocus>
  <div class="err" id="pin-err"></div>
</div>

<div id="shell">
  <div id="tabs-bar">
    <button id="new-tab-btn" title="New tab">＋</button>
  </div>
  <div id="url-bar">
    <button id="back-btn" class="navbtn" title="Back" aria-label="Back">←</button>
    <button id="forward-btn" class="navbtn" title="Forward" aria-label="Forward">→</button>
    <button id="reload-btn" class="navbtn" title="Reload" aria-label="Reload">↻</button>
    <input id="url-input" type="url" placeholder="Search or enter URL…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="go-btn">Go</button>
    <button id="mic-btn" title="Voice">🎤</button>
  </div>
  <div id="swipe-zone" aria-label="Swipe left or right to switch tabs" role="tablist"></div>
  <div id="content">
    <iframe id="content-frame"></iframe>
    <div id="content-placeholder">
      <div class="logo">XEN</div>
      <div class="hint">Connected to Mac Xen Browser session</div>
    </div>
  </div>
  <div id="status-bar">
    <span id="conn-status"><span class="dot grey" id="conn-dot"></span>connecting…</span>
    <span id="tab-count">0 tabs</span>
  </div>
</div>

<script>
const PIN = '0000';
// api.xlrd.org = Cloudflare tunnel → omnimind :4441
// Falls back to direct LAN if on same network
const API = (() => {
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return 'http://127.0.0.1:4441';
  return 'https://api.xlrd.org';
})();

let session = { tabs: [], activeId: null, seq: 0 };
let sse = null;

// ── PIN gate ──────────────────────────────────────────────────────────────
document.getElementById('pin-input').addEventListener('input', e => { if (e.target.value.length === 4) checkPin(); });
document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPin(); });

function checkPin() {
  if (document.getElementById('pin-input').value === PIN) {
    document.getElementById('pin-gate').style.display = 'none';
    document.getElementById('shell').style.display = 'flex';
    connectSession();
  } else {
    document.getElementById('pin-err').textContent = 'Wrong PIN';
    document.getElementById('pin-input').value = '';
    setTimeout(() => document.getElementById('pin-err').textContent = '', 1500);
  }
}

// ── Session sync ──────────────────────────────────────────────────────────
function connectSession() {
  if (sse) sse.close();
  sse = new EventSource(`${API}/api/browser/events`);
  sse.onopen = () => setConn(true);
  sse.onerror = () => { setConn(false); setTimeout(connectSession, 3000); };
  sse.addEventListener('session', e => {
    session = JSON.parse(e.data);
    renderTabs();
  });
}

function setConn(ok) {
  document.getElementById('conn-dot').className = `dot ${ok ? 'green' : 'red'}`;
  document.getElementById('conn-status').childNodes[1].textContent = ok ? 'live' : 'reconnecting…';
}

// ── Tab rendering ─────────────────────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  const btn = document.getElementById('new-tab-btn');
  // Remove old tab els
  bar.querySelectorAll('.tab').forEach(el => el.remove());
  session.tabs.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'tab' + (t.id === session.activeId ? ' active' : '');
    el.textContent = t.title || urlHost(t.url) || 'New Tab';
    el.title = t.url || '';
    el.onclick = () => switchTab(t.id);
    bar.insertBefore(el, btn);
  });
  document.getElementById('tab-count').textContent = `${session.tabs.length} tab${session.tabs.length !== 1 ? 's' : ''}`;
  const active = session.tabs.find(t => t.id === session.activeId);
  if (active) {
    document.getElementById('url-input').value = active.url || '';
    loadPreview(active.url);
  }
}

function loadPreview(url) {
  const frame = document.getElementById('content-frame');
  const ph = document.getElementById('content-placeholder');
  if (url && url !== 'about:blank' && url !== '') {
    frame.src = url;
    frame.style.display = 'block';
    ph.style.display = 'none';
  } else {
    frame.style.display = 'none';
    ph.style.display = 'flex';
  }
}

// ── Commands → omnimind → Mac XenBrowser ─────────────────────────────────
async function cmd(body) {
  try {
    const r = await fetch(`${API}/api/browser/cmd`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    return r.ok ? r.json() : {};
  } catch { return {}; }
}

function switchTab(id) { cmd({ action: 'tab_focus', id }); }

function newTab(url) { cmd({ action: 'tab_new', url: url || 'about:blank' }); }

function navigate(raw) {
  let url = raw.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = url.includes('.') ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url);
  cmd({ action: 'navigate', url });
  document.getElementById('url-input').value = url;
}

function urlHost(url) { try { return new URL(url).hostname.replace('www.',''); } catch { return url; } }

// ── UI events ─────────────────────────────────────────────────────────────
document.getElementById('new-tab-btn').onclick = () => newTab();
document.getElementById('go-btn').onclick = () => navigate(document.getElementById('url-input').value);
document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') navigate(e.target.value); });

// ── Voice ─────────────────────────────────────────────────────────────────
const micBtn = document.getElementById('mic-btn');
let recognition = null;
micBtn.onclick = () => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Voice not supported'); return; }
  if (recognition && micBtn.classList.contains('listening')) { recognition.stop(); return; }
  recognition = new SR();
  recognition.lang = 'en-US'; recognition.interimResults = false;
  recognition.onstart = () => micBtn.classList.add('listening');
  recognition.onend = () => micBtn.classList.remove('listening');
  recognition.onresult = e => navigate(e.results[0][0].transcript);
  recognition.start();
};

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

// === Nav buttons + swipe-tabs (added by Xen) ===
async function _xenNav(action, extra){
  try{ return await fetch(`${API}/api/browser/cmd`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({action}, extra||{}))}); }
  catch(e){ console.warn('nav', action, e); }
}
document.getElementById('back-btn')?.addEventListener('click', ()=>_xenNav('back'));
document.getElementById('forward-btn')?.addEventListener('click', ()=>_xenNav('forward'));
document.getElementById('reload-btn')?.addEventListener('click', ()=>_xenNav('reload'));
(function(){
  const z=document.getElementById('swipe-zone'); if(!z) return;
  let sx=null, sy=null, t0=0;
  z.addEventListener('touchstart',e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; t0=Date.now(); }, {passive:true});
  z.addEventListener('touchend',e=>{
    if(sx===null) return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    sx=null;
    if(Date.now()-t0 > 700) return;
    if(Math.abs(dy) > 30) return;
    if(Math.abs(dx) < 40) return;
    _xenNav(dx<0 ? 'tab_next' : 'tab_prev');
  }, {passive:true});
})();

</script>
</body>
</html>
